<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Lọc & Nhận Coupon Cao Cấp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #0284c7;
            --primary-light: #e0f2fe;
            --primary-hover: #0369a1;
            --success: #10b981;
            --success-light: #d1fae5;
            --success-hover: #059669;
            --danger: #f43f5e;
            --dark: #1e293b;
            --gray-bg: #f8fafc;
            --border: #e2e8f0;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.2px;
        }

        body { 
            margin: 0; 
            padding: 24px 16px;
            background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            width: 100%;
            max-width: 680px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 32px 24px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px -15px rgba(2, 132, 199, 0.12);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .top-navbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            width: 100%;
            max-width: 680px;
        }

        .btn-toggle-admin {
            width: auto;
            background: #ffffff;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-toggle-admin:hover {
            background: var(--gray-bg);
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }

        .app-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .app-header h2 {
            font-size: 26px;
            color: var(--dark);
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .app-header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
        }

        h3 { 
            font-size: 16px;
            font-weight: 600;
            color: var(--dark); 
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-user {
            border: 1px solid rgba(2, 132, 199, 0.15); 
            border-radius: 20px; 
            background: #ffffff;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.02);
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
        }

        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            display: block;
        }

        input[type="text"], input[type="password"], input[type="datetime-local"] { 
            width: 100%; 
            padding: 14px 14px 14px 46px; 
            border-radius: 14px; 
            border: 1px solid var(--border); 
            font-size: 15px; 
            box-sizing: border-box;
            background: var(--gray-bg);
            color: var(--dark);
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.12);
        }

        input:disabled {
            background-color: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
        }

        button { 
            width: 100%;
            padding: 14px 20px; 
            border-radius: 14px; 
            border: none;
            cursor: pointer; 
            font-weight: 600; 
            font-size: 15px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease; 
        }

        /* MODAL POPUP DÀNH CHO ADMIN */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .modal-content {
            background: #ffffff;
            width: 100%;
            max-width: 520px;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--gray-bg);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 14px;
            transition: 0.2s;
        }

        .modal-close:hover {
            background: #e2e8f0;
            color: var(--dark);
        }

        .btn-admin { background-color: var(--dark); color: white; }
        .btn-admin:hover { background-color: #0f172a; }

        /* THIẾT KẾ BẢNG THỐNG KÊ ADMIN */
        .admin-section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--dark);
            margin: 18px 0 10px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--gray-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 10px;
            text-align: center;
        }

        .stat-card .stat-value {
            font-size: 22px;
            font-weight: 700;
            margin-top: 4px;
            line-height: 1.2;
        }

        .stat-card.remaining .stat-value { color: var(--success); }
        .stat-card.claimed .stat-value { color: var(--danger); }
        .stat-card.total .stat-value { color: var(--primary); }

        .stat-card .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .product-stats-list {
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px 14px;
            background: #ffffff;
        }

        .product-stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border);
            font-size: 13px;
        }

        .product-stat-item:last-child {
            border-bottom: none;
        }

        .product-stat-name {
            font-weight: 600;
            color: var(--dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 65%;
        }

        /* BADGE THỐNG KÊ KHO */
        .product-stat-count {
            font-weight: 700;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        /* Khi CHƯA DÙNG coupon nào (100% còn nguyên) -> Nền xanh nhạt */
        .product-stat-count.badge-unused {
            background: var(--primary-light);
            color: var(--primary-hover);
        }

        /* Khi ĐÃ CÓ coupon bị sử dụng -> Nền đỏ nhạt, chữ đỏ nổi bật */
        .product-stat-count.badge-used {
            background: #ffe4e6;
            color: #e11d48;
            border: 1px solid #fecdd3;
        }

        .file-upload-wrapper {
            margin: 16px 0;
            padding: 16px;
            border: 2px dashed var(--border);
            border-radius: 14px;
            text-align: center;
            background: var(--gray-bg);
        }
        
        input[type="file"] {
            font-size: 14px;
            color: var(--text-muted);
            width: 100%;
        }

        /* THIẾT KẾ KẾT QUẢ TÌM KIẾM SẢN PHẨM */
        .product-card {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-top: 24px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .product-title { 
            font-size: 15px; 
            font-weight: 700; 
            color: var(--dark); 
            background: #f8fafc;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .coupon-list {
            padding: 10px 20px;
        }

        .coupon-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 14px 0; 
            border-bottom: 1px dashed var(--border); 
        }
        .coupon-item:last-child { border-bottom: none; }

        .coupon-code {
            font-family: monospace;
            font-weight: 700;
            background: var(--primary-light);
            color: var(--primary-hover);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 15px;
        }

        .btn-copy { 
            background-color: var(--success); 
            color: white; 
            padding: 8px 16px; 
            font-size: 13px; 
            width: auto;
            border-radius: 10px;
        }
        .btn-copy:hover { background-color: var(--success-hover); }

        #adminStatus {
            margin-top: 14px;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
        }

        .status-success { color: var(--success); }
        .status-error { color: var(--danger); }

        .loading-spinner { 
            color: var(--text-muted); 
            text-align: center;
            font-size: 14px;
            margin: 20px 0;
        }
        
        .used-badge {
            color: var(--text-muted);
            font-style: italic;
            font-size: 13px;
        }

        @media (max-width: 576px) {
            body { padding: 16px 12px; }
            .container { padding: 24px 16px; border-radius: 20px; }
            .app-header h2 { font-size: 22px; }
            input[type="text"], input[type="password"], input[type="datetime-local"] {
                padding: 14px 14px 14px 44px;
                font-size: 14px;
            }
            .coupon-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 16px 0;
            }
            .btn-copy { width: 100%; justify-content: center; padding: 12px; }
            .modal-content { padding: 24px 16px; border-radius: 20px; }
            .stats-grid { gap: 6px; }
            .stat-card .stat-value { font-size: 18px; }
            .stat-card .stat-label { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="top-navbar">
    <button class="btn-toggle-admin" onclick="openAdminModal()">
        <i class="fa-solid fa-user-gear"></i> Admin
    </button>
</div>

<div class="container">
    <div class="app-header">
        <h2><i class="fa-solid fa-ticket" style="color: var(--primary);"></i> COUPON, PMH GVGS_EVENT</h2>
        <p>Coupon, PMH các Sản phẩm GVGS - Event</p>
    </div>

    <div class="section-user">
        <h3><i class="fa-solid fa-search"></i> Tra cứu & Nhận Coupon</h3>
        
        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="userName" placeholder="Nhập User..." oninput="validateUser()">
        </div>
        
        <div class="input-group">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchKey" placeholder="Vui lòng điền tên trước khi tìm sản phẩm..." oninput="searchCoupon()" disabled>
        </div>
        
        <div id="loadingText" class="loading-spinner" style="display:none;">
            <i class="fa-solid fa-spinner fa-spin" style="color: var(--primary)"></i> Đang đồng bộ kiểm tra dữ liệu hạn dùng...
        </div>
        
        <div id="resultArea"></div>
    </div>
</div>

<!-- MODAL CẤU HÌNH ADMIN & THỐNG KÊ -->
<div id="adminModal" class="admin-modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeAdminModal()"><i class="fa-solid fa-xmark"></i></button>
        
        <!-- BƯỚC 1: ĐĂNG NHẬP XÁC THỰC ADMIN -->
        <div id="adminAuthSection">
            <h3><i class="fa-solid fa-user-shield"></i> Xác thực Admin</h3>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="adminPassword" placeholder="Nhập mật khẩu Admin...">
            </div>
            <button class="btn-admin" onclick="authenticateAdmin()">
                <i class="fa-solid fa-right-to-bracket"></i> Đăng Nhập Quyền Admin
            </button>
            <div id="authError" class="status-error" style="margin-top: 10px; text-align: center;"></div>
        </div>

        <!-- BƯỚC 2: DASHBOARD THỐNG KÊ & TẢI FILE (ẨN KHI CHƯA DĂNG NHẬP) -->
        <div id="adminDashboardSection" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h3 style="margin:0;"><i class="fa-solid fa-chart-pie"></i> Thống Kê Kho Coupon</h3>
                <button onclick="adminLogout()" style="width: auto; padding: 6px 12px; font-size: 12px; background: #e2e8f0; color: var(--dark); border-radius: 8px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Thoát
                </button>
            </div>

            <!-- CARD THỐNG KÊ TỔNG QUAN -->
            <div class="stats-grid">
                <div class="stat-card remaining">
                    <div class="stat-label">Còn lại (Chưa dùng)</div>
                    <div class="stat-value" id="statRemaining">0</div>
                </div>
                <div class="stat-card claimed">
                    <div class="stat-label">Đã sử dụng</div>
                    <div class="stat-value" id="statClaimed">0</div>
                </div>
                <div class="stat-card total">
                    <div class="stat-label">Tổng Coupon</div>
                    <div class="stat-value" id="statTotal">0</div>
                </div>
            </div>

            <!-- DANH SÁCH THỐNG KÊ THEO SẢN PHẨM -->
            <div class="admin-section-title"><i class="fa-solid fa-boxes-stacked"></i> Thống kê theo sản phẩm</div>
            <div class="product-stats-list" id="productStatsList">
                <div style="text-align: center; color: var(--text-muted); padding: 10px;">Chưa có dữ liệu</div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">

            <!-- FORM TẢI FILE & CẤU HÌNH -->
            <div class="admin-section-title"><i class="fa-solid fa-cloud-arrow-up"></i> Cập nhật kho Excel & Hạn dùng</div>

            <label class="input-label"><i class="fa-solid fa-clock"></i> Chọn ngày & giờ hết hiệu lực:</label>
            <div class="input-group" style="margin-bottom: 10px;">
                <i class="fa-solid fa-calendar-days"></i>
                <input type="datetime-local" id="expireDate">
            </div>
            
            <div class="file-upload-wrapper">
                <input type="file" id="excelFile" accept=".xlsx, .xls">
            </div>
            
            <button class="btn-admin" onclick="handleUpload()">
                <i class="fa-solid fa-cloud-arrow-up"></i> Tải Lên & Khóa Hạn Dùng
            </button>
            <div id="adminStatus"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxnlrz68NXUUAZ4pt6alk4YRdzvMIwbYMyzVkakwlykDntCxV7npG_BeevogQFln_W4/exec"; 
    
    let localData = []; 
    let isSystemExpired = false;
    let targetExpireTime = null;
    let isAdminLoggedIn = false;

    window.onload = async function() {
        await refreshData();
        setInterval(checkTimeRealtime, 1000);
    };

    function openAdminModal() {
        document.getElementById("adminModal").style.display = "flex";
        if (isAdminLoggedIn) {
            updateAdminDashboard();
        }
    }

    function closeAdminModal() {
        document.getElementById("adminModal").style.display = "none";
        document.getElementById("adminStatus").innerHTML = "";
        document.getElementById("authError").innerHTML = "";
    }

    /* XÁC THỰC ADMIN */
    function authenticateAdmin() {
        const pass = document.getElementById("adminPassword").value.trim();
        const authError = document.getElementById("authError");

        if (!pass) {
            authError.innerHTML = "Vui lòng nhập mật khẩu Quản trị!";
            return;
        }

        isAdminLoggedIn = true;
        authError.innerHTML = "";
        document.getElementById("adminAuthSection").style.display = "none";
        document.getElementById("adminDashboardSection").style.display = "block";
        
        updateAdminDashboard();
    }

    function adminLogout() {
        isAdminLoggedIn = false;
        document.getElementById("adminPassword").value = "";
        document.getElementById("adminAuthSection").style.display = "block";
        document.getElementById("adminDashboardSection").style.display = "none";
    }

    /* TÍNH TOÁN & CẬP NHẬT DASHBOARD ADMIN */
    function updateAdminDashboard() {
        if (!isAdminLoggedIn) return;

        let total = localData.length;
        let claimed = 0;
        let remaining = 0;
        let productMap = {};

        localData.forEach(item => {
            let isClaimed = !!item.claimedBy;
            if (isClaimed) {
                claimed++;
            } else {
                remaining++;
            }

            let prodName = item.productName || "Sản phẩm không tên";
            if (!productMap[prodName]) {
                productMap[prodName] = { total: 0, remaining: 0, claimed: 0 };
            }
            productMap[prodName].total++;
            if (isClaimed) {
                productMap[prodName].claimed++;
            } else {
                productMap[prodName].remaining++;
            }
        });

        // Cập nhật số liệu các thẻ
        document.getElementById("statTotal").innerText = total;
        document.getElementById("statRemaining").innerText = remaining;
        document.getElementById("statClaimed").innerText = claimed;

        // Render danh sách chi tiết theo từng sản phẩm
        const listContainer = document.getElementById("productStatsList");
        listContainer.innerHTML = "";

        if (Object.keys(productMap).length === 0) {
            listContainer.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 10px;">Chưa có dữ liệu Coupon</div>`;
            return;
        }

        for (let pName in productMap) {
            let pData = productMap[pName];
            let itemDiv = document.createElement("div");
            itemDiv.className = "product-stat-item";
            
            // ĐIỀU KIỆN ĐỔI MÀU: 
            // Nếu sản phẩm đã có coupon bị sử dụng (claimed > 0) -> dùng màu đỏ (badge-used)
            // Nếu chưa dùng coupon nào (claimed === 0) -> dùng màu xanh (badge-unused)
            let badgeStyleClass = (pData.claimed > 0) ? "badge-used" : "badge-unused";

            itemDiv.innerHTML = `
                <span class="product-stat-name" title="${pName}">${pName}</span>
                <span class="product-stat-count ${badgeStyleClass}">
                    Còn lại: <b>${pData.remaining}</b> / ${pData.total}
                </span>
            `;
            listContainer.appendChild(itemDiv);
        }
    }

    async function refreshData() {
        showLoading(true);
        try {
            let response = await fetch(API_URL);
            let resultObject = await response.json();
            
            localData = resultObject.coupons || [];
            let cloudExpireDate = resultObject.expireDate || "";
            isSystemExpired = resultObject.isExpired || false;
            
            if (cloudExpireDate) {
                document.getElementById("expireDate").value = cloudExpireDate;
                targetExpireTime = new Date(cloudExpireDate.replace('T', ' ').replace(/-/g, '/')).getTime();
            } else {
                targetExpireTime = null;
            }

            applyLockState();
            
            // Cập nhật lại số liệu realtime nếu panel đang mở
            if (isAdminLoggedIn) {
                updateAdminDashboard();
            }

        } catch (error) {
            console.error("Lỗi tải dữ liệu:", error);
        }
        showLoading(false);
    }

    function checkTimeRealtime() {
        if (targetExpireTime && !isSystemExpired) {
            let nowTime = new Date().getTime();
            if (nowTime >= targetExpireTime) {
                isSystemExpired = true;
                applyLockState();
            }
        }
    }

    function applyLockState() {
        const userNameInput = document.getElementById("userName");
        const searchInput = document.getElementById("searchKey");
        const resultArea = document.getElementById("resultArea");

        if (isSystemExpired) {
            userNameInput.disabled = true;
            userNameInput.value = "";
            userNameInput.placeholder = "HỆ THỐNG ĐÃ KHÓA: Chương trình đã hết hạn!";
            
            searchInput.disabled = true;
            searchInput.value = "";
            searchInput.placeholder = "Hạn nhận mã đã đóng...";
            
            resultArea.innerHTML = "<div class='loading-spinner' style='color:var(--danger);font-weight:600;'><i class='fa-solid fa-clock-rotate-left'></i> Đợt nhận coupon này đã kết thúc! Hệ thống tra cứu đã tự động khóa.</div>";
        } else {
            userNameInput.disabled = false;
            userNameInput.placeholder = "Nhập User...";
            validateUser(); 
        }
    }

    function showLoading(isLoading) {
        document.getElementById("loadingText").style.display = isLoading ? "block" : "none";
    }

    function validateUser() {
        if (isSystemExpired) return; 

        const userNameInput = document.getElementById("userName");
        const searchInput = document.getElementById("searchKey");
        const resultArea = document.getElementById("resultArea");
        const userName = userNameInput.value.trim();

        if (userName.length > 0) {
            searchInput.disabled = false;
            searchInput.placeholder = "Gõ tên sản phẩm cần tìm...";
        } else {
            searchInput.disabled = true;
            searchInput.value = "";
            searchInput.placeholder = "Vui lòng điền tên trước khi tìm sản phẩm...";
            resultArea.innerHTML = "";
        }
    }

    function handleUpload() {
        const password = document.getElementById("adminPassword").value;
        const fileInput = document.getElementById("excelFile");
        const expireDateInput = document.getElementById("expireDate").value; 
        const statusDiv = document.getElementById("adminStatus");

        if (!password) return alert("Vui lòng điền mật khẩu quản trị!");
        if (!expireDateInput) return alert("Vui lòng chọn ngày giờ hiệu lực!");
        if (fileInput.files.length === 0) return alert("Bạn chưa chọn file Excel nào!");

        statusDiv.className = "";
        statusDiv.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Hệ thống đang cập nhật...";
        
        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            const rawJson = XLSX.utils.sheet_to_json(worksheet, {header: 1});

            const formData = new URLSearchParams();
            formData.append("action", "uploadData");
            formData.append("password", password);
            formData.append("expireDate", expireDateInput); 
            formData.append("data", JSON.stringify(rawJson));

            fetch(API_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: formData.toString()
            }).then(() => {
                statusDiv.className = "status-success";
                statusDiv.innerHTML = "<i class='fa-solid fa-circle-check'></i> Đồng bộ kho dữ liệu thành công!";
                setTimeout(async () => {
                    await refreshData();
                    closeAdminModal();
                }, 1500);
            }).catch(err => {
                statusDiv.className = "status-error";
                statusDiv.innerHTML = "<i class='fa-solid fa-circle-xmark'></i> Lỗi kết nối: " + err;
            });
        };
        reader.readAsArrayBuffer(file);
    }

    function searchCoupon() {
        if (isSystemExpired) return;

        const keyword = document.getElementById("searchKey").value.toLowerCase().trim();
        const resultArea = document.getElementById("resultArea");
        resultArea.innerHTML = "";

        if (!keyword) return;

        let grouped = {};
        let hasMatch = false;

        localData.forEach(item => {
            if (item.productName && item.productName.toLowerCase().includes(keyword) && !item.claimedBy) {
                if (!grouped[item.productName]) {
                    grouped[item.productName] = [];
                }
                grouped[item.productName].push(item.coupon);
                hasMatch = true;
            }
        });

        if (!hasMatch) {
            resultArea.innerHTML = "<div class='loading-spinner'>Không tìm thấy coupon khả dụng cho sản phẩm này.</div>";
            return;
        }

        for (let prodName in grouped) {
            let cardDiv = document.createElement("div");
            cardDiv.className = "product-card";
            
            let html = `<div class="product-title"><i class="fa-solid fa-box-open" style="color:var(--primary);"></i> ${prodName}</div>`;
            html += `<div class="coupon-list">`;
            
            grouped[prodName].forEach(cp => {
                html += `
                    <div class="coupon-item">
                        <span class="coupon-code">${cp}</span>
                        <button class="btn-copy" onclick="copyAndClaim('${cp}', this)">
                            <i class="fa-solid fa-copy"></i> Nhận Mã
                        </button>
                    </div>
                `;
            });
            
            html += `</div>`;
            cardDiv.innerHTML = html;
            resultArea.appendChild(cardDiv);
        }
    }

    async function copyAndClaim(couponCode, buttonEl) {
        if (isSystemExpired) return alert("Hệ thống đã hết hạn!");
        
        const user = document.getElementById("userName").value.trim();
        if (!user) {
            alert("Vui lòng điền tên trước khi nhận mã!");
            return;
        }

        navigator.clipboard.writeText(couponCode).then(async () => {
            buttonEl.className = "btn-copy";
            buttonEl.style.backgroundColor = "var(--text-muted)";
            buttonEl.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Đang lưu...";
            buttonEl.disabled = true;

            try {
                let res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "claimCoupon",
                        coupon: couponCode,
                        user: user
                    })
                });
                let dataRes = await res.json();
                
                if(dataRes.success === false) {
                    alert(dataRes.message || "Có lỗi xảy ra!");
                    await refreshData();
                    return;
                }
                
                localData = localData.map(item => {
                    if (item.coupon === couponCode) {
                        item.claimedBy = user;
                    }
                    return item;
                });

                if (isAdminLoggedIn) {
                    updateAdminDashboard();
                }
                
                buttonEl.parentElement.innerHTML = `<span class="used-badge"><i class="fa-solid fa-circle-check" style="color:var(--success)"></i> Nhận thành công</span>`;

            } catch (error) {
                alert("Lỗi lưu trữ dữ liệu!");
            }
        }).catch(err => {
            alert("Lỗi không thể tự động sao chép!");
        });
    }
</script>
